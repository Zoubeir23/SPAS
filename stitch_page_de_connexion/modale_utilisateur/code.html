<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modale Utilisateur</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1c3dab",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 font-display flex items-center justify-center min-h-screen p-4">
<!-- Modal Backdrop -->
<div aria-hidden="true" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 transition-opacity"></div>
<!-- Modal Container -->
<div class="relative z-50 w-full max-w-4xl bg-background-light dark:bg-background-dark rounded-xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
<!-- Modal Header -->
<div class="flex items-center justify-between px-6 py-5 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-background-dark sticky top-0 z-10">
<div>
<h2 class="text-xl font-bold text-[#0e111a] dark:text-white tracking-tight">Ajouter un utilisateur</h2>
<p class="text-sm text-[#516194] dark:text-gray-400 mt-1">Créez un nouveau profil pour le système académique.</p>
</div>
<button class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body (Scrollable) -->
<div class="flex-1 overflow-y-auto p-6 md:p-8 space-y-8">
<!-- Section 1: Profile & Basic Info -->
<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
<!-- Profile Picture (Left Column) -->
<div class="lg:col-span-4 flex flex-col items-center text-center space-y-4 pt-2">
<div class="relative group cursor-pointer">
<div class="w-32 h-32 rounded-full bg-cover bg-center border-4 border-white dark:border-gray-800 shadow-lg relative overflow-hidden" data-alt="Portrait of a user placeholder" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDc4rxs9l_0gF8u__EZaTSCuAgU_xTJJTXgPuLzl-GB-sA4kX3ZESps6h-aNSHMw-WpnZxxG_TU6PFVRRObrc6LOQzpGOPifS0L6l4bOMu1eipy1SmEUC_SNkVT5zNyKw-O_aReP6uRQsHzx00FqVE_qkU1VG_KVfwY_7RaHD9ScoBmddreHPyohsD58dyqELbDRblWd2xYGTN2UEmhYo_nCGle9-LunLzq-zUw8825FNSyq13zXZG0aJotZxxGCpZlg_lomDBHQd8H');">
<div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-white text-3xl">photo_camera</span>
</div>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-md hover:bg-blue-700 transition-colors flex items-center justify-center w-9 h-9 border-2 border-white dark:border-gray-800">
<span class="material-symbols-outlined text-sm">edit</span>
</button>
</div>
<div>
<h4 class="text-[#0e111a] dark:text-white font-semibold text-lg">Photo de profil</h4>
<p class="text-xs text-[#516194] dark:text-gray-400 mt-1">Formats: JPG, PNG. Max 2MB.</p>
</div>
</div>
<!-- Basic Info Fields (Right Column) -->
<div class="lg:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-5">
<label class="flex flex-col gap-2">
<span class="text-[#0e111a] dark:text-gray-200 text-sm font-medium">Prénom <span class="text-red-500">*</span></span>
<input class="w-full rounded-lg border border-[#d1d6e6] dark:border-gray-700 bg-white dark:bg-gray-800 text-[#0e111a] dark:text-white px-4 h-12 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-[#516194]/50" placeholder="Ex: Thomas" type="text"/>
</label>
<label class="flex flex-col gap-2">
<span class="text-[#0e111a] dark:text-gray-200 text-sm font-medium">Nom <span class="text-red-500">*</span></span>
<input class="w-full rounded-lg border border-[#d1d6e6] dark:border-gray-700 bg-white dark:bg-gray-800 text-[#0e111a] dark:text-white px-4 h-12 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-[#516194]/50" placeholder="Ex: Dubois" type="text"/>
</label>
<label class="flex flex-col gap-2 md:col-span-2">
<span class="text-[#0e111a] dark:text-gray-200 text-sm font-medium">Email <span class="text-red-500">*</span></span>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">mail</span>
<input class="w-full rounded-lg border border-[#d1d6e6] dark:border-gray-700 bg-white dark:bg-gray-800 text-[#0e111a] dark:text-white pl-11 pr-4 h-12 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-[#516194]/50" placeholder="thomas.dubois@university.edu" type="email"/>
</div>
</label>
<label class="flex flex-col gap-2 md:col-span-2">
<span class="text-[#0e111a] dark:text-gray-200 text-sm font-medium">Téléphone</span>
<input class="w-full rounded-lg border border-[#d1d6e6] dark:border-gray-700 bg-white dark:bg-gray-800 text-[#0e111a] dark:text-white px-4 h-12 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-[#516194]/50" placeholder="+33 6 12 34 56 78" type="tel"/>
</label>
</div>
</div>
<hr class="border-gray-200 dark:border-gray-800"/>
<!-- Section 2: Role Selection -->
<div>
<h3 class="text-[#0e111a] dark:text-white text-lg font-bold mb-4">Rôle et Permissions</h3>
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
<!-- Role: Administrateur -->
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="role" type="radio"/>
<div class="flex flex-col items-center justify-center p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-primary/50 peer-checked:border-primary peer-checked:bg-primary/5 transition-all h-full">
<div class="w-12 h-12 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex items-center justify-center mb-3">
<span class="material-symbols-outlined">admin_panel_settings</span>
</div>
<span class="text-sm font-bold text-[#0e111a] dark:text-white text-center">Administrateur</span>
<span class="text-xs text-[#516194] dark:text-gray-400 text-center mt-1">Accès complet</span>
</div>
<div class="absolute top-3 right-3 opacity-0 peer-checked:opacity-100 transition-opacity text-primary">
<span class="material-symbols-outlined filled text-xl">check_circle</span>
</div>
</label>
<!-- Role: Direction Pédagogique -->
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="role" type="radio"/>
<div class="flex flex-col items-center justify-center p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-primary/50 peer-checked:border-primary peer-checked:bg-primary/5 transition-all h-full">
<div class="w-12 h-12 rounded-full bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 flex items-center justify-center mb-3">
<span class="material-symbols-outlined">school</span>
</div>
<span class="text-sm font-bold text-[#0e111a] dark:text-white text-center">Direction Pédagogique</span>
<span class="text-xs text-[#516194] dark:text-gray-400 text-center mt-1">Gestion des programmes</span>
</div>
<div class="absolute top-3 right-3 opacity-0 peer-checked:opacity-100 transition-opacity text-primary">
<span class="material-symbols-outlined filled text-xl">check_circle</span>
</div>
</label>
<!-- Role: Enseignant -->
<label class="relative group cursor-pointer">
<input checked="" class="peer sr-only" name="role" type="radio"/>
<div class="flex flex-col items-center justify-center p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-primary/50 peer-checked:border-primary peer-checked:bg-primary/5 transition-all h-full">
<div class="w-12 h-12 rounded-full bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 flex items-center justify-center mb-3">
<span class="material-symbols-outlined">cast_for_education</span>
</div>
<span class="text-sm font-bold text-[#0e111a] dark:text-white text-center">Enseignant</span>
<span class="text-xs text-[#516194] dark:text-gray-400 text-center mt-1">Gestion des cours</span>
</div>
<div class="absolute top-3 right-3 opacity-0 peer-checked:opacity-100 transition-opacity text-primary">
<span class="material-symbols-outlined filled text-xl">check_circle</span>
</div>
</label>
<!-- Role: Data Scientist -->
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="role" type="radio"/>
<div class="flex flex-col items-center justify-center p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-primary/50 peer-checked:border-primary peer-checked:bg-primary/5 transition-all h-full">
<div class="w-12 h-12 rounded-full bg-orange-100 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400 flex items-center justify-center mb-3">
<span class="material-symbols-outlined">science</span>
</div>
<span class="text-sm font-bold text-[#0e111a] dark:text-white text-center">Data Scientist</span>
<span class="text-xs text-[#516194] dark:text-gray-400 text-center mt-1">Analytique &amp; Prédictions</span>
</div>
<div class="absolute top-3 right-3 opacity-0 peer-checked:opacity-100 transition-opacity text-primary">
<span class="material-symbols-outlined filled text-xl">check_circle</span>
</div>
</label>
</div>
</div>
<hr class="border-gray-200 dark:border-gray-800"/>
<!-- Section 3: Credentials -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="space-y-5">
<h3 class="text-[#0e111a] dark:text-white text-lg font-bold">Identifiants de connexion</h3>
<label class="flex flex-col gap-2">
<span class="text-[#0e111a] dark:text-gray-200 text-sm font-medium">Nom d'utilisateur <span class="text-red-500">*</span></span>
<input class="w-full rounded-lg border border-[#d1d6e6] dark:border-gray-700 bg-white dark:bg-gray-800 text-[#0e111a] dark:text-white px-4 h-12 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-[#516194]/50" placeholder="thomas.dubois" type="text"/>
</label>
<label class="flex flex-col gap-2">
<span class="text-[#0e111a] dark:text-gray-200 text-sm font-medium">Mot de passe <span class="text-red-500">*</span></span>
<div class="relative">
<input class="w-full rounded-lg border border-[#d1d6e6] dark:border-gray-700 bg-white dark:bg-gray-800 text-[#0e111a] dark:text-white px-4 h-12 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all pr-10" type="password" value="Password123"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
<!-- Password Strength Bar -->
<div class="flex gap-1 mt-1 h-1">
<div class="bg-green-500 flex-1 rounded-full"></div>
<div class="bg-green-500 flex-1 rounded-full"></div>
<div class="bg-green-500 flex-1 rounded-full"></div>
<div class="bg-gray-200 dark:bg-gray-700 flex-1 rounded-full"></div>
</div>
<p class="text-xs text-green-600 dark:text-green-400 mt-0.5">Mot de passe fort</p>
</label>
<label class="flex flex-col gap-2">
<span class="text-[#0e111a] dark:text-gray-200 text-sm font-medium">Confirmer le mot de passe <span class="text-red-500">*</span></span>
<input class="w-full rounded-lg border border-[#d1d6e6] dark:border-gray-700 bg-white dark:bg-gray-800 text-[#0e111a] dark:text-white px-4 h-12 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" type="password"/>
</label>
</div>
<div class="space-y-6 pt-0 md:pt-12">
<div class="bg-blue-50 dark:bg-blue-900/20 p-5 rounded-xl border border-blue-100 dark:border-blue-900/50">
<h4 class="text-primary dark:text-blue-400 font-bold mb-3 flex items-center gap-2">
<span class="material-symbols-outlined">settings</span>
                            Paramètres du compte
                        </h4>
<div class="space-y-4">
<label class="flex items-start gap-3 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer sr-only" type="checkbox"/>
<div class="w-11 h-6 bg-gray-300 dark:bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</div>
<div>
<span class="text-sm font-medium text-[#0e111a] dark:text-white block">Envoyer un email d'activation</span>
<span class="text-xs text-[#516194] dark:text-gray-400 block">L'utilisateur recevra un lien pour définir son mot de passe.</span>
</div>
</label>
<label class="flex items-start gap-3 cursor-pointer group">
<div class="relative flex items-center">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="w-11 h-6 bg-gray-300 dark:bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</div>
<div>
<span class="text-sm font-medium text-[#0e111a] dark:text-white block">Activer le compte immédiatement</span>
<span class="text-xs text-[#516194] dark:text-gray-400 block">Si désactivé, l'utilisateur ne pourra pas se connecter.</span>
</div>
</label>
</div>
</div>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="bg-gray-50 dark:bg-gray-800/50 px-6 py-4 border-t border-gray-200 dark:border-gray-800 flex justify-end items-center gap-3">
<button class="px-5 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-200 font-medium text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                Annuler
            </button>
<button class="px-5 py-2.5 rounded-lg bg-primary hover:bg-blue-800 text-white font-medium text-sm shadow-md transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-lg">check</span>
                Créer l'utilisateur
            </button>
</div>
</div>
</body></html>
