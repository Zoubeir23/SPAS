name: CI/CD Pipeline - SPAS

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install dev dependencies for linting and security
          pip install flake8 bandit pytest pytest-django pytest-cov

      - name: 🔍 Lint with flake8
        run: |
          cd backend
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings. Max line length = 120
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: 🔒 Security scan with bandit
        run: |
          cd backend
          # Scan for security issues, exclude tests and migrations
          bandit -r apps/ -ll -f json -o bandit-report.json || true
          bandit -r apps/ -ll || true
        continue-on-error: true

      - name: ✅ Django system check
        run: |
          cd backend
          # Create minimal .env for CI (django-environ compatibility)
          cat > .env << EOF
          SECRET_KEY=ci-test-secret-key-not-for-production-12345678901234567890
          DEBUG=False
          DATABASE_URL=sqlite:///ci_db.sqlite3
          ALLOWED_HOSTS=localhost,127.0.0.1
          REDIS_URL=redis://localhost:6379/0
          CELERY_BROKER_URL=redis://localhost:6379/0
          EOF
          # Check if Django configuration is valid
          python manage.py check --deploy --fail-level WARNING
        env:
          DJANGO_SETTINGS_MODULE: config.settings

      - name: 🧪 Run tests with pytest
        run: |
          cd backend
          # Run all tests with coverage
          pytest tests/ -v --tb=short --cov=apps --cov-report=term-missing || echo "No tests found or tests failed"
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: 'ci-test-secret-key-not-for-production'
          DEBUG: 'True'
          DATABASE_URL: 'sqlite:///test_db.sqlite3'
        continue-on-error: true

      - name: 📊 Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/.coverage
          retention-days: 7

  frontend:
    name: Frontend (React + TypeScript)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['18.x']

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: |
          cd frontend
          npm ci

      - name: 🔍 Lint with ESLint
        run: |
          cd frontend
          npm run lint || echo "Linting completed with warnings"
        continue-on-error: true

      - name: 🏗️ Build production bundle
        run: |
          cd frontend
          npm run build
        env:
          CI: true
          NODE_ENV: production

      - name: 📊 Check bundle size
        run: |
          cd frontend
          ls -lh dist/
          du -sh dist/

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔒 Run npm audit (Frontend)
        run: |
          cd frontend
          npm audit --audit-level=moderate || echo "Vulnerabilities found - review required"
        continue-on-error: true

      - name: 🔒 Run pip audit (Backend)
        run: |
          cd backend
          pip install pip-audit
          pip-audit -r requirements.txt || echo "Vulnerabilities found - review required"
        continue-on-error: true

      - name: 📋 Generate security report
        run: |
          echo "=== Security Audit Report ===" > security-report.txt
          echo "Date: $(date)" >> security-report.txt
          echo "" >> security-report.txt
          echo "Frontend npm audit:" >> security-report.txt
          cd frontend && npm audit || true
          echo "" >> security-report.txt
          echo "Backend dependency check:" >> security-report.txt
          cd ../backend && pip-audit -r requirements.txt || true

      - name: 📊 Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit-report
          path: security-report.txt
          retention-days: 30

  # Optional: Deploy job (uncomment when ready for production)
